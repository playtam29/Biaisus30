<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test API Trading Economics</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:24px}
    .card{max-width:920px;margin:auto;background:#111827;border:1px solid #334155;border-radius:16px;padding:20px}
    input,button,a{font:inherit;padding:12px 14px;border-radius:10px;border:1px solid #475569}
    input{width:100%;background:#0b1220;color:#fff;margin:10px 0 14px}
    button,a{display:inline-block;background:#38bdf8;color:#082f49;border:0;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px;text-decoration:none}
    pre{background:#020617;color:#cbd5e1;padding:14px;border-radius:12px;overflow:auto;white-space:pre-wrap;min-height:120px}
    .muted{color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <h1>Test API Trading Economics</h1>
    <p class="muted">Version debug v5 ultra simple.</p>
    <input id="apiKey" type="text" placeholder="Colle ta clé API ici" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <button type="button" onclick="testHealth()">Tester la fonction</button>
    <button type="button" onclick="loadData()">Charger les données</button>
    <a href="/.netlify/functions/health" target="_blank" rel="noopener">Ouvrir health</a>
    <pre id="output">JS chargé v5. En attente...</pre>
  </div>

  <script>
    function setOut(msg){ document.getElementById('output').textContent = msg; }
    window.onerror = function(msg, src, line, col){ setOut('Erreur JS: ' + msg + ' @' + line + ':' + col); };

    async function testHealth(){
      setOut('Bouton health cliqué');
      try {
        const r = await fetch('/.netlify/functions/health?ts=' + Date.now(), { cache: 'no-store' });
        const t = await r.text();
        setOut('HTTP ' + r.status + '
' + t);
      } catch (e) {
        setOut('Erreur health: ' + e.message);
      }
    }

    async function loadData(){
      setOut('Bouton load cliqué');
      try {
        const apiKey = (document.getElementById('apiKey').value || '').trim();
        if (!apiKey) {
          setOut('Ajoute d'abord ta clé API.');
          return;
        }
        setOut('Chargement...');
        const r = await fetch('/.netlify/functions/te-calendar?ts=' + Date.now(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey: apiKey })
        });
        const t = await r.text();
        setOut('HTTP ' + r.status + '
' + t);
      } catch (e) {
        setOut('Erreur load: ' + e.message);
      }
    }
  </script>
</body>
</html>
