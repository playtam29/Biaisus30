<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test API Trading Economics</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:24px}
    .card{max-width:920px;margin:auto;background:#111827;border:1px solid #334155;border-radius:16px;padding:20px}
    input,button,a{font:inherit;padding:12px 14px;border-radius:10px;border:1px solid #475569}
    input{width:100%;background:#0b1220;color:#fff;margin:10px 0 14px}
    button,a{display:inline-block;background:#38bdf8;color:#082f49;border:0;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px;text-decoration:none}
    pre{background:#020617;color:#cbd5e1;padding:14px;border-radius:12px;overflow:auto;white-space:pre-wrap;min-height:120px}
    .muted{color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <h1>Test API Trading Economics</h1>
    <p class="muted">Version debug v4.</p>
    <input id="apiKey" type="text" placeholder="Colle ta clé API ici" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <button id="healthBtn" type="button">Tester la fonction</button>
    <button id="loadBtn" type="button">Charger les données</button>
    <a href="/.netlify/functions/health" target="_blank" rel="noopener">Ouvrir health</a>
    <pre id="output">JS chargé v4. En attente...</pre>
  </div>

  <script>
    window.onerror = function(msg, src, line, col, err){
      document.getElementById('output').textContent = 'Erreur JS: ' + msg + ' @' + line + ':' + col;
    };

    const output = document.getElementById('output');
    const apiKeyInput = document.getElementById('apiKey');
    const healthBtn = document.getElementById('healthBtn');
    const loadBtn = document.getElementById('loadBtn');

    healthBtn.addEventListener('click', function(){ testHealth(); });
    loadBtn.addEventListener('click', function(){ loadData(); });

    async function testHealth(){
      output.textContent = 'Test fonction...';
      try {
        const response = await fetch('/.netlify/functions/health?ts=' + Date.now(), { cache: 'no-store' });
        const txt = await response.text();
        output.textContent = 'HTTP ' + response.status + '
' + txt;
      } catch (error) {
        output.textContent = 'Erreur health: ' + error.message;
      }
    }

    async function loadData(){
      output.textContent = 'Clic détecté...';
      const apiKey = (apiKeyInput.value || '').trim();
      if (!apiKey) {
        output.textContent = 'Ajoute d'abord ta clé API.';
        return;
      }
      output.textContent = 'Chargement...';
      try {
        const response = await fetch('/.netlify/functions/te-calendar?ts=' + Date.now(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Cache-Control': 'no-cache' },
          body: JSON.stringify({ apiKey: apiKey })
        });
        const txt = await response.text();
        output.textContent = 'HTTP ' + response.status + '
' + txt;
      } catch (error) {
        output.textContent = 'Erreur : ' + error.message;
      }
    }
  </script>
</body>
</html>
